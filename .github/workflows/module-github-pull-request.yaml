name: module-github-pull-request
on: workflow_call

jobs:
  pull-request:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: mheap/github-action-required-labels@0ac283b4e65c1fb28ce6079dea5546ceca98ccbe # v5.5.2
        with:
          mode: exactly
          count: 1
          labels: "breaking-change,feature,fix,other,ignore-release"
